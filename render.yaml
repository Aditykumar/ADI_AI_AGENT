services:
  - type: web
    name: ai-testing-agent-backend
    runtime: node
    rootDir: web/backend
    buildCommand: npm install && cd ../.. && npm install --legacy-peer-deps && cd web/backend
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DB_PATH
        value: /tmp/data/db.json
      - key: REPORTS_DIR
        value: /tmp/data/reports
      - key: SCREENSHOTS_DIR
        value: /tmp/data/screenshots
      - key: MAX_REPORTS_PER_USER
        value: 10
