services:
  - type: web
    name: ai-testing-agent-backend
    runtime: node
    rootDir: web/backend
    buildCommand: npm install && node ../../node_modules/playwright/cli.js install chromium || true
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false          # set in Render dashboard to your Vercel URL
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false           # paste your free Groq key in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DB_PATH
        value: /tmp/data/db.json
      - key: REPORTS_DIR
        value: /tmp/data/reports
      - key: SCREENSHOTS_DIR
        value: /tmp/data/screenshots
      - key: MAX_REPORTS_PER_USER
        value: 10
